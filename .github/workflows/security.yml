name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 8am UTC

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Go vulnerability check ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # --- Trivy filesystem scan ---
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Trivy IaC scan ---
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # --- Semgrep SAST (auto rules) ---
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      # --- Semgrep custom project rules ---
      # These enforce attest-specific security invariants that the auto ruleset
      # cannot catch: terminal output sanitization, prompt injection prevention,
      # path traversal after filepath.Join, git stderr exposure, and silent
      # json.Marshal error discard. Findings here block CI.
      - name: Semgrep custom rules
        run: |
          pip install semgrep --quiet
          semgrep --config .semgrep/attest-security.yaml \
                  --error \
                  --metrics=off \
                  .
