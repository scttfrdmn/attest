version: 2

project_name: attest

builds:
  - main: ./cmd/attest
    binary: attest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "attest_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - frameworks/**
      - classification-schemes/**

checksum:
  name_template: "checksums.txt"

# Keyless cosign signing via Sigstore/Rekor.
# Verifiable: cosign verify-blob <binary> --bundle <binary>.bundle
#   --certificate-identity-regexp 'github.com/provabl/attest'
#   --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

sbom:
  - artifacts: archive

changelog:
  use: file
  path: CHANGELOG.md

release:
  github:
    owner: provabl
    name: attest
  name_template: "{{.Tag}}"
  extra_files:
    - glob: "*.pem"
    - glob: "*.sig"
