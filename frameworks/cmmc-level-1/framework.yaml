id: cmmc-level-1
name: CMMC Level 1 — Foundational (FAR 52.204-21)
version: '2.0 (32 CFR Part 170, effective Dec 2024)'
assessment_type: self
assessment_cycle: annual
source: https://dodcio.defense.gov/CMMC/

# CMMC Level 1 — Foundational Cyber Hygiene
# 17 practices from FAR Clause 52.204-21 (Basic Safeguarding of Covered Contractor
# Information Systems), required to protect Federal Contract Information (FCI).
#
# Scope: ALL DoD contractors handling FCI — not just CUI-handling organizations.
# Assessment: Annual self-assessment; results submitted to SPRS (Supplier Performance
#   Risk System) via PIEE (Procurement Integrated Enterprise Environment).
#   SPRS submission: https://www.sprs.csd.disa.mil/ (login via PIEE/CAC)
# Scoring: Pass/fail on all 17 practices. All must be implemented prior to award.
#
# Level 1 is NOT a delta on Level 2 — it is a standalone, simpler baseline
# (a strict subset of NIST SP 800-171 Rev 2). If pursuing CMMC Level 2 certification,
# activate nist-800-171-r2 in addition to this framework.
#
# Control ID convention: AC.1.001 = Access Control, CMMC practice 001
#   Practice IDs correspond to FAR 52.204-21 paragraphs b.1 through b.6.
#   Mapping to NIST 800-171 Rev 2 controls is noted in each practice description.
#
# Physical Protection (PE) notes:
#   AWS datacenter physical security is covered by AWS Compliance programs (SOC 2
#   Type II, ISO 27001, FedRAMP High). PE controls apply to CUSTOMER-controlled
#   facilities (offices, server rooms, co-location) where FCI is accessed or processed.
#
# artifact_reports referenced below appear in the AWS Artifact portal and can be
# downloaded to satisfy evidence requirements for AWS-inherited controls.

artifact_reports:
- series: SOC 2 Type II
  category: SOC
- series: ISO 27001
  category: ISO
- series: FedRAMP
  category: FedRAMP

controls:

# ─────────────────────────────────────────────────────────────────────────────
# Access Control (AC) — 4 practices  [FAR 52.204-21 (b)(1)]
# ─────────────────────────────────────────────────────────────────────────────

- id: AC.1.001
  family: Access Control
  title: Limit system access to authorized users, processes acting on behalf of
    authorized users, and devices (including other systems)
  description: |
    FAR 52.204-21 b.1.i. Maps to NIST SP 800-171 Rev 2 control 3.1.1.
    Ensures only authenticated, authorized principals can reach systems
    processing FCI.
  responsibility:
    aws: IAM service enforces policy-based access control for all API calls;
      Organizations SCPs provide org-wide guardrails; no anonymous access is
      possible to authenticated AWS services
    customer: Provision accounts only to authorized users; use IAM roles instead
      of shared credentials; enforce least-privilege policies; review and
      deactivate accounts promptly when personnel depart; maintain an
      authoritative list of authorized users and devices
  structural:
  - id: scp-deny-anonymous-access
    description: Deny all API actions from anonymous (unauthenticated) principals
    actions:
    - '*'
    conditions:
    - aws:PrincipalType == Anonymous
    effect: Deny
  - id: scp-require-org-principals
    description: Restrict FCI-scope S3 actions to principals within the AWS Organization
    actions:
    - s3:PutObject
    - s3:GetObject
    - s3:DeleteObject
    conditions:
    - aws:PrincipalOrgID == ''
    effect: Deny
  operational:
  - id: cedar-authorized-access
    description: Access to FCI resources requires current authorization status on the principal
    entities: [principal, resource]
    attributes:
      principal: [authorization_current, account_status, account_type]
      resource: [data_classification, owner_account]
  monitoring:
  - id: config-no-shared-credentials
    resource_type: AWS::IAM::User
    check: No IAM users with access keys assigned to multiple human operators;
      roles preferred for all service access
  - id: config-inactive-console-users
    resource_type: AWS::IAM::User
    check: No IAM users with console access inactive for more than 90 days;
      alert and disable stale accounts
  - id: config-root-account-unused
    resource_type: AWS::IAM::User
    check: Root account has no active access keys and has not been used for
      routine operations in the past 90 days
  assessment:
    objectives:
    - id: AC.1.001[a]
      description: Authorized users of the system are identified
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.001[b]
      description: Processes acting on behalf of authorized users are identified
      auto_assessable: true
      evidence_source: scp
    - id: AC.1.001[c]
      description: Devices (and other systems) authorized to connect to the system
        are identified
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.001[d]
      description: System access is limited to authorized users, processes, and devices
      auto_assessable: true
      evidence_source: scp
    - id: AC.1.001[e]
      description: Stale or departed-user accounts are disabled in a timely manner
      auto_assessable: true
      evidence_source: config
  review_schedule:
    frequency: annual
    trigger: calendar

- id: AC.1.002
  family: Access Control
  title: Limit system access to the types of transactions and functions that
    authorized users are permitted to execute
  description: |
    FAR 52.204-21 b.1.ii. Maps to NIST SP 800-171 Rev 2 control 3.1.2.
    Enforces least-privilege by restricting each identity to only the
    actions required for its defined role.
  responsibility:
    aws: IAM policy evaluation engine enforces resource-level permissions on every
      API call; permission boundaries provide hard limits on privilege escalation
    customer: Define and enforce which transaction types each role may perform;
      deny excessive permissions; review policy changes via CloudTrail; use
      permission boundaries to constrain maximum privilege; conduct annual
      least-privilege review
  structural:
  - id: scp-deny-wildcard-admin
    description: Deny wildcard admin actions (iam:*, organizations:*) outside
      designated admin OU paths
    actions:
    - iam:*
    - organizations:*
    - account:*
    conditions:
    - aws:PrincipalOrgPaths != /*/admin/*
    effect: Deny
  - id: scp-restrict-unused-services
    description: Deny access to AWS services not approved for FCI processing in
      this organization
    actions:
    - aws-marketplace:*
    conditions:
    - aws:PrincipalOrgPaths != /*/admin/*
    effect: Deny
  monitoring:
  - id: config-no-star-star-policies
    resource_type: AWS::IAM::Policy
    check: No customer-managed IAM policies with Action:* and Resource:* in the
      same Allow statement
  assessment:
    objectives:
    - id: AC.1.002[a]
      description: Types of transactions and functions authorized users are permitted
        to execute are defined
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.002[b]
      description: Authorized users are limited to the types of transactions and
        functions they are permitted to execute
      auto_assessable: true
      evidence_source: scp

- id: AC.1.003
  family: Access Control
  title: Verify and control/limit connections to external systems
  description: |
    FAR 52.204-21 b.1.iii. Maps to NIST SP 800-171 Rev 2 control 3.1.20.
    Governs connections between the organization's systems and external
    networks, organizations, and cloud services outside the FCI boundary.
  responsibility:
    aws: VPC provides network isolation; Direct Connect and Client VPN enable
      private connectivity; PrivateLink allows private access to AWS services
      without traversing the public internet; Transit Gateway manages
      inter-account connectivity
    customer: Identify and document all external system connections; verify each
      connection is authorized before establishment; prohibit unauthorized
      external connections via SCPs and security group rules; use VPC endpoints
      rather than internet-routed paths for AWS service access
  structural:
  - id: scp-deny-unapproved-regions
    description: Limit FCI system operations to approved AWS regions (data
      residency and network boundary control)
    actions:
    - '*'
    conditions:
    - aws:RequestedRegion not in [us-east-1, us-east-2, us-west-1, us-west-2]
    effect: Deny
  monitoring:
  - id: config-vpc-peering-approved
    resource_type: AWS::EC2::VPCPeeringConnection
    check: All VPC peering connections are to accounts within the organization
      or explicitly approved external accounts; no ad-hoc peering
  - id: config-transit-gateway-approved
    resource_type: AWS::EC2::TransitGateway
    check: Transit gateway attachments are limited to organizational accounts;
      external attachments documented and approved
  - id: config-no-igw-private-fci
    resource_type: AWS::EC2::InternetGateway
    check: Private subnets hosting FCI workloads have no direct internet gateway
      routes; traffic must route through NAT or VPN
  assessment:
    objectives:
    - id: AC.1.003[a]
      description: External systems with connections to organizational systems are
        identified
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.003[b]
      description: The use of external systems is verified and authorized
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.003[c]
      description: Connections to external systems are monitored and controlled
      auto_assessable: true
      evidence_source: config

- id: AC.1.004
  family: Access Control
  title: Control information posted or processed on publicly accessible information
    systems
  description: |
    FAR 52.204-21 b.1.iv. Maps to NIST SP 800-171 Rev 2 control 3.1.22.
    Prevents FCI from being inadvertently exposed on public-facing systems
    (public S3 buckets, public repositories, public web services).
  responsibility:
    aws: S3 Block Public Access (account and bucket level), CloudFront origin
      policies, and API Gateway authorizers prevent unintended public exposure
      of data; these controls are enforced by SCP
    customer: Review information before posting to publicly accessible systems;
      prohibit FCI from public-facing S3 buckets, public repositories (GitHub,
      CodeCommit), and unauthenticated API endpoints; designate individuals
      authorized to post to public systems
  structural:
  - id: scp-enforce-s3-block-public-access
    description: Block S3 public access at the AWS account level for all accounts
      in the organization
    actions:
    - s3:PutBucketPublicAccessBlock
    conditions:
    - s3:PublicAccessBlockAmazonS3 != true
    effect: Deny
  - id: scp-deny-public-acls
    description: Deny S3 PutBucketAcl or PutObjectAcl that would expose data
      publicly via canned ACLs
    actions:
    - s3:PutBucketAcl
    - s3:PutObjectAcl
    conditions:
    - s3:x-amz-acl in [public-read, public-read-write, authenticated-read]
    effect: Deny
  monitoring:
  - id: config-s3-block-public-access
    resource_type: AWS::S3::Bucket
    check: All S3 buckets have BlockPublicAcls, BlockPublicPolicy,
      IgnorePublicAcls, and RestrictPublicBuckets set to true
  - id: config-no-public-rds-snapshots
    resource_type: AWS::RDS::DBSnapshot
    check: No RDS snapshots are marked as publicly restorable
  assessment:
    objectives:
    - id: AC.1.004[a]
      description: Individuals authorized to post information to publicly
        accessible systems are identified
      auto_assessable: false
      evidence_source: manual
    - id: AC.1.004[b]
      description: FCI is not posted or processed on publicly accessible systems
      auto_assessable: true
      evidence_source: scp
    - id: AC.1.004[c]
      description: S3 Block Public Access is enforced at the account level
      auto_assessable: true
      evidence_source: config

# ─────────────────────────────────────────────────────────────────────────────
# Identification and Authentication (IA) — 2 practices  [FAR 52.204-21 (b)(2)]
# ─────────────────────────────────────────────────────────────────────────────

- id: IA.1.076
  family: Identification and Authentication
  title: Identify information system users, processes acting on behalf of users,
    and devices
  description: |
    FAR 52.204-21 b.2.i. Maps to NIST SP 800-171 Rev 2 control 3.5.1.
    Every user, automated process, and device must have a unique identity
    before access to FCI systems is considered.
  responsibility:
    aws: IAM assigns a unique ARN and identity to every principal (user, role,
      and service); no anonymous access is possible on authenticated API calls
    customer: Assign unique identifiers to all users; prohibit shared accounts
      and group credentials; use unique IAM roles for each automated process
      or service; maintain an authoritative identity register
  monitoring:
  - id: config-no-shared-iam-users
    resource_type: AWS::IAM::User
    check: No shared service accounts; every IAM user and role has a distinct
      owner documented in tagging (Owner tag required)
  - id: config-no-root-access-keys
    resource_type: AWS::IAM::AccessKey
    check: Root account has no active access keys; root is identified only for
      break-glass scenarios
  assessment:
    objectives:
    - id: IA.1.076[a]
      description: System users are identified
      auto_assessable: false
      evidence_source: manual
    - id: IA.1.076[b]
      description: Processes acting on behalf of users are identified
      auto_assessable: true
      evidence_source: config
    - id: IA.1.076[c]
      description: Devices accessing the system are identified
      auto_assessable: false
      evidence_source: manual

- id: IA.1.077
  family: Identification and Authentication
  title: Authenticate (or verify) the identities of those users, processes, or
    devices, as a prerequisite to allowing access
  description: |
    FAR 52.204-21 b.2.ii. Maps to NIST SP 800-171 Rev 2 control 3.5.2.
    Requires authentication of every identity before access to FCI systems
    is granted; MFA enforced for all human principals.
  responsibility:
    aws: IAM authentication infrastructure supports passwords, access keys, MFA
      hardware/virtual tokens, and STS short-lived credentials; STS provides
      time-limited credential issuance for role assumption
    customer: Enforce MFA for all human users accessing the AWS console and CLI;
      use IAM roles with STS assume-role for service-to-service authentication;
      prohibit long-lived static access keys for human access; rotate
      programmatic credentials on a defined schedule
  structural:
  - id: scp-require-mfa
    description: Deny all console and API actions from IAM users without active
      MFA session
    actions:
    - '*'
    conditions:
    - aws:MultiFactorAuthPresent != true
    - aws:PrincipalType == IAMUser
    effect: Deny
  monitoring:
  - id: config-iam-mfa-all-users
    resource_type: AWS::IAM::User
    check: All IAM users with console access have an MFA device enrolled and active
  - id: config-no-long-lived-access-keys
    resource_type: AWS::IAM::AccessKey
    check: No IAM access keys older than 90 days; alert on keys older than 60 days
  assessment:
    objectives:
    - id: IA.1.077[a]
      description: The identity of each user accessing the system is authenticated
        prior to access
      auto_assessable: true
      evidence_source: scp
    - id: IA.1.077[b]
      description: The identity of each process acting on behalf of a user is
        authenticated prior to access
      auto_assessable: true
      evidence_source: config
    - id: IA.1.077[c]
      description: Authenticators (passwords, keys, tokens) are managed and
        protected from unauthorized disclosure
      auto_assessable: false
      evidence_source: manual

# ─────────────────────────────────────────────────────────────────────────────
# Media Protection (MP) — 1 practice  [FAR 52.204-21 (b)(3)]
# AWS is responsible for physical media destruction at datacenter retirement
# (covered by SOC 2 Type II and NIST SP 800-88 attestation in AWS Artifact).
# Customer is responsible for sanitization of data on digital media they control.
# ─────────────────────────────────────────────────────────────────────────────

- id: MP.1.118
  family: Media Protection
  title: Sanitize or destroy information system media containing Federal Contract
    Information before disposal or reuse
  description: |
    FAR 52.204-21 b.3. Maps to NIST SP 800-171 Rev 2 control 3.8.3.
    Ensures FCI cannot be recovered from storage media after the media is
    disposed of or repurposed. Applies to both physical media (hard drives,
    USB drives) and logical/cloud media (EBS volumes, S3 objects, RDS instances).
  responsibility:
    aws: AWS physically destroys all storage media per NIST SP 800-88 when
      decommissioning datacenter equipment; this is attested in the AWS SOC 2
      Type II report available in AWS Artifact — customers inherit this control
      for infrastructure-level media
    customer: Sanitize or destroy digital media containing FCI before deletion
      or transfer; use KMS CMK deletion (cryptographic erasure) when deleting
      EBS volumes and S3 objects; delete EBS snapshots and AMIs containing FCI;
      purge RDS backups and automated snapshots; sanitize developer workstations
      and portable media before repurposing; document all sanitization actions
  operational:
  - id: cedar-media-sanitization-gate
    description: Environments with active FCI designation must have a documented
      and current media sanitization policy before decommissioning is permitted
    entities: [environment]
    attributes:
      environment: [media_sanitization_policy_current, fci_data_present,
        decommission_authorized]
    admin_dependencies:
    - control_id: MP.1.118
      attribute: environment.media_sanitization_policy_current
      consequence: Decommission operations blocked; media sanitization compliance
        unverifiable without active policy documentation
  assessment:
    objectives:
    - id: MP.1.118[a]
      description: System media containing FCI is sanitized or destroyed before
        disposal
      auto_assessable: false
      evidence_source: manual
    - id: MP.1.118[b]
      description: System media containing FCI is sanitized before reuse
      auto_assessable: false
      evidence_source: manual
    - id: MP.1.118[c]
      description: Media sanitization actions are documented with date, method,
        and responsible party
      auto_assessable: false
      evidence_source: manual
    - id: MP.1.118[d]
      description: KMS CMKs used for FCI encryption are deleted (cryptographic
        erasure) when the associated media is decommissioned
      auto_assessable: false
      evidence_source: manual
  review_schedule:
    frequency: annual
    trigger: calendar

# ─────────────────────────────────────────────────────────────────────────────
# Physical Protection (PE) — 4 practices  [FAR 52.204-21 (b)(4)]
# AWS datacenter physical security satisfies the AWS-side of each PE control.
# Evidence: AWS SOC 2 Type II (physical security section) in AWS Artifact.
# Customer must apply equivalent controls to their own facilities and
# co-location environments where FCI is accessed or processed.
# ─────────────────────────────────────────────────────────────────────────────

- id: PE.1.131
  family: Physical Protection
  title: Limit physical access to organizational information systems, equipment,
    and the respective operating environments to authorized individuals
  description: |
    FAR 52.204-21 b.4.i. Maps to NIST SP 800-171 Rev 2 control 3.10.1.
    Controls physical entry to any location where FCI systems are installed
    or operated — offices, server rooms, network closets, and co-location
    facilities.
  responsibility:
    aws: AWS manages physical security for all AWS datacenter facilities using
      multi-layer physical controls (perimeter security, electronic badging,
      biometric entry, CCTV); customers do not have physical access to AWS
      infrastructure — this satisfies the datacenter-level requirement
    customer: Limit physical access to your offices, server rooms, network
      closets, and any co-location facility where FCI is accessed or processed;
      maintain a formal access authorization list; use badge/keycard access
      systems with electronic audit logs; review access authorization lists
      at least annually and revoke access within 24 hours of personnel departure
  assessment:
    objectives:
    - id: PE.1.131[a]
      description: Individuals authorized to access organizational facilities
        containing systems or equipment that process FCI are identified
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.131[b]
      description: Physical access to facilities is limited to authorized
        individuals
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.131[c]
      description: Access authorization lists are reviewed and updated at least
        annually
      auto_assessable: false
      evidence_source: manual
  review_schedule:
    frequency: annual
    trigger: calendar

- id: PE.1.132
  family: Physical Protection
  title: Escort visitors and monitor visitor activity
  description: |
    FAR 52.204-21 b.4.ii. Maps to NIST SP 800-171 Rev 2 control 3.10.3.
    Ensures individuals without standing physical access authorization are
    accompanied by an authorized escort when in areas where FCI is present.
  responsibility:
    aws: AWS enforces strict visitor escort and monitoring policies at all
      datacenter facilities; escorted access is logged and included in SOC 2
      Type II attestation
    customer: Escort all visitors in your own facilities wherever FCI is
      present; prohibit unescorted visitor access to server rooms or office
      areas where FCI systems are operated; maintain visitor logs with name,
      affiliation, escort, entry/exit times, and purpose of visit
  assessment:
    objectives:
    - id: PE.1.132[a]
      description: Visitors in areas where FCI is present are escorted by an
        authorized individual
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.132[b]
      description: Visitor activity is monitored while in FCI areas
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.132[c]
      description: A visitor log is maintained with entry/exit times, purpose,
        and escort identification
      auto_assessable: false
      evidence_source: manual
  review_schedule:
    frequency: annual
    trigger: calendar

- id: PE.1.133
  family: Physical Protection
  title: Maintain audit logs of physical access
  description: |
    FAR 52.204-21 b.4.iii. Maps to NIST SP 800-171 Rev 2 control 3.10.4.
    Requires logging of all physical entry events to facilities where FCI
    is present, enabling post-incident investigation.
  responsibility:
    aws: AWS maintains electronic access logs for all datacenter facilities;
      log contents are attested in the AWS SOC 2 Type II report available in
      AWS Artifact
    customer: Maintain audit logs of physical access to your own facilities
      using badge reader logs, visitor sign-in sheets, or electronic access
      control systems; retain logs for at least 90 days (longer preferred);
      protect logs from tampering; review logs periodically for anomalies and
      after any security incident
  assessment:
    objectives:
    - id: PE.1.133[a]
      description: Audit logs of physical access to FCI areas are maintained
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.133[b]
      description: Physical access audit logs are retained for at least 90 days
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.133[c]
      description: Physical access logs are reviewed periodically and after
        security incidents
      auto_assessable: false
      evidence_source: manual
  review_schedule:
    frequency: annual
    trigger: calendar

- id: PE.1.134
  family: Physical Protection
  title: Control and manage physical access devices
  description: |
    FAR 52.204-21 b.4.iv. Maps to NIST SP 800-171 Rev 2 control 3.10.5.
    Governs the lifecycle management of keys, key cards, badges, PINs, and
    combinations that control physical access to FCI areas.
  responsibility:
    aws: AWS manages badge/keycard issuance and revocation for all datacenter
      personnel; lost/stolen badges are deactivated immediately and reported
    customer: Maintain an inventory of all physical access devices (keycards,
      badges, physical keys, PINs, combinations) for your facilities; assign
      devices individually (no shared badges); revoke access within 24 hours
      of personnel departure; report lost or stolen devices immediately and
      reissue; conduct annual inventory audit of all access devices
  assessment:
    objectives:
    - id: PE.1.134[a]
      description: Physical access devices are inventoried
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.134[b]
      description: Physical access devices are individually assigned (not shared)
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.134[c]
      description: Physical access devices are revoked upon personnel departure
        within 24 hours
      auto_assessable: false
      evidence_source: manual
    - id: PE.1.134[d]
      description: Lost, stolen, or compromised physical access devices are
        reported and replacements issued promptly
      auto_assessable: false
      evidence_source: manual
  review_schedule:
    frequency: annual
    trigger: calendar

# ─────────────────────────────────────────────────────────────────────────────
# System and Communications Protection (SC) — 2 practices  [FAR 52.204-21 (b)(5)]
# ─────────────────────────────────────────────────────────────────────────────

- id: SC.1.175
  family: System and Communications Protection
  title: Monitor, control, and protect organizational communications (i.e.,
    information transmitted or received by organizational information systems)
    at the external boundaries and key internal boundaries of the information
    systems
  description: |
    FAR 52.204-21 b.5.i. Maps to NIST SP 800-171 Rev 2 control 3.13.1.
    Establishes boundary protections for all communications entering or
    leaving FCI systems, including internet perimeter, email, API endpoints,
    and internal segmentation boundaries.
  responsibility:
    aws: VPC provides network isolation; Security Groups and NACLs control
      traffic at subnet and instance boundaries; GuardDuty monitors for
      threats at AWS network edges; Network Firewall and WAF protect
      application-layer boundaries
    customer: Monitor and control communications at all external boundaries —
      configure Security Groups to allow only required traffic; enable VPC
      flow logs; deploy WAF on internet-facing load balancers and API
      gateways; implement DMARC/SPF/DKIM for email domain protection;
      configure email filtering (SES receipt rules) for spam and malware;
      review boundary configurations at least annually
  structural:
  - id: scp-deny-sensitive-port-ingress
    description: Deny creation of security group rules allowing unrestricted
      internet access to sensitive administrative ports without security-admin
      approval
    actions:
    - ec2:AuthorizeSecurityGroupIngress
    conditions:
    - ec2:FromPort in [22, 23, 3389, 1433, 3306, 5432, 27017]
    - ec2:IpProtocol == tcp
    - aws:PrincipalOrgPaths != /*/security-admin/*
    effect: Deny
  monitoring:
  - id: config-sg-no-unrestricted-inbound
    resource_type: AWS::EC2::SecurityGroup
    check: No security groups allow unrestricted inbound access (0.0.0.0/0 or
      ::/0) on management or database ports
  - id: config-vpc-flow-logs-enabled
    resource_type: AWS::EC2::VPC
    check: VPC flow logs enabled in all FCI-scope VPCs; logs delivered to
      centralized audit account
  - id: config-waf-on-alb
    resource_type: AWS::WAFv2::WebACL
    check: WAF web ACL attached to all internet-facing Application Load
      Balancers and API Gateways
  - id: config-dmarc-policy
    resource_type: AWS::Route53::RecordSet
    check: DMARC TXT record (v=DMARC1) with p=quarantine or p=reject published
      for all organizational email-sending domains
  - id: config-spf-record
    resource_type: AWS::Route53::RecordSet
    check: SPF TXT record (v=spf1) configured for all organizational
      email-sending domains
  - id: config-ses-dkim-enabled
    resource_type: AWS::SES::EmailIdentity
    check: DKIM signing enabled on all SES sending identities for organizational
      domains
  assessment:
    objectives:
    - id: SC.1.175[a]
      description: External organizational communications are monitored
      auto_assessable: true
      evidence_source: config
    - id: SC.1.175[b]
      description: External organizational communications are controlled at
        boundaries
      auto_assessable: true
      evidence_source: scp
    - id: SC.1.175[c]
      description: Key internal organizational communications are monitored
        and controlled at boundaries
      auto_assessable: true
      evidence_source: config
    - id: SC.1.175[d]
      description: Email domain spoofing is prevented via DMARC/SPF/DKIM
      auto_assessable: true
      evidence_source: config

- id: SC.1.176
  family: System and Communications Protection
  title: Implement subnetworks for publicly accessible system components that
    are physically or logically separated from internal networks
  description: |
    FAR 52.204-21 b.5.ii. Maps to NIST SP 800-171 Rev 2 control 3.13.5.
    Requires a DMZ or public/private subnet architecture so that
    internet-facing components are separated from systems storing or
    processing FCI.
  responsibility:
    aws: VPC enables public/private subnet architecture with independent route
      tables; NACLs enforce subnet-level traffic boundaries; Internet Gateway
      and NAT Gateway support controlled internet access patterns
    customer: Architect VPCs with dedicated public subnets (internet-facing) and
      private subnets (FCI systems); ensure FCI workloads reside only in
      private subnets with no direct internet gateway routes; use NAT Gateway
      for outbound-only internet access from private subnets; tag FCI resources
      with attest:data-class=FCI for automated compliance checks
  structural:
  - id: scp-deny-fci-direct-internet
    description: Deny route table entries that provide direct internet gateway
      access to resources tagged as FCI
    actions:
    - ec2:CreateRoute
    - ec2:ReplaceRoute
    conditions:
    - ec2:GatewayId contains igw-
    - aws:RequestTag/attest:data-class == FCI
    effect: Deny
  monitoring:
  - id: config-fci-instances-in-private-subnets
    resource_type: AWS::EC2::Instance
    check: EC2 instances tagged attest:data-class=FCI are deployed in private
      subnets only; no public IP addresses assigned
  - id: config-private-subnet-no-igw
    resource_type: AWS::EC2::Subnet
    check: Subnets hosting FCI instances have no routes to an internet gateway;
      use NAT gateway for outbound access
  assessment:
    objectives:
    - id: SC.1.176[a]
      description: Publicly accessible system components are identified
      auto_assessable: false
      evidence_source: manual
    - id: SC.1.176[b]
      description: A subnetwork (DMZ or public/private architecture) is
        implemented to separate public-access components from FCI components
      auto_assessable: true
      evidence_source: config
    - id: SC.1.176[c]
      description: FCI systems are in private subnets with no direct internet
        gateway routes
      auto_assessable: true
      evidence_source: config

# ─────────────────────────────────────────────────────────────────────────────
# System and Information Integrity (SI) — 4 practices  [FAR 52.204-21 (b)(6)]
# ─────────────────────────────────────────────────────────────────────────────

- id: SI.1.210
  family: System and Information Integrity
  title: Identify, report, and correct information and information system flaws
    in a timely manner
  description: |
    FAR 52.204-21 b.6.i. Maps to NIST SP 800-171 Rev 2 control 3.14.1.
    Establishes a patch and vulnerability management process for all systems
    processing FCI, including timely identification, reporting, and
    remediation of known flaws.
  responsibility:
    aws: AWS manages patching for fully managed services (RDS, Lambda, EKS
      managed node groups, OpenSearch); AWS publishes Security Bulletins for
      disclosed vulnerabilities affecting AWS services; ECR scans container
      images for CVEs
    customer: Identify and correct information system flaws on customer-managed
      components (EC2 instances, ECS/EKS custom AMIs, container images);
      use SSM Patch Manager for EC2; track CVEs via Amazon Inspector; remediate
      critical findings within 30 days, high within 60 days, medium within 90
      days; document and track exceptions with a formal POA&M
  monitoring:
  - id: config-ssm-patch-compliance
    resource_type: AWS::SSM::PatchCompliance
    check: All EC2 instances are compliant with the patch baseline; no critical
      patches missing; non-compliant instances trigger automated remediation
  - id: config-inspector-critical-findings
    resource_type: AWS::Inspector2::Finding
    check: No critical Inspector findings older than 30 days; no high-severity
      findings older than 60 days; suppressed findings have documented rationale
  assessment:
    objectives:
    - id: SI.1.210[a]
      description: System flaws are identified in a timely manner
      auto_assessable: true
      evidence_source: config
    - id: SI.1.210[b]
      description: System flaws are reported to appropriate organizational
        personnel
      auto_assessable: false
      evidence_source: manual
    - id: SI.1.210[c]
      description: System flaws are corrected within defined timeframes
      auto_assessable: true
      evidence_source: config
    - id: SI.1.210[d]
      description: Security alerts and advisories from vendors and government
        sources are addressed in a timely manner
      auto_assessable: false
      evidence_source: manual

- id: SI.1.211
  family: System and Information Integrity
  title: Provide protection from malicious code at appropriate locations within
    organizational information systems
  description: |
    FAR 52.204-21 b.6.ii. Maps to NIST SP 800-171 Rev 2 control 3.14.2 (partial).
    Requires deployment of malicious code detection and prevention mechanisms
    at host, network, email, and storage layers of FCI systems.
  responsibility:
    aws: Amazon GuardDuty provides threat intelligence-based detection across
      VPC traffic, DNS queries, and CloudTrail events; Amazon Macie identifies
      sensitive data patterns that may indicate exfiltration; GuardDuty Malware
      Protection scans EC2 EBS volumes and S3 objects on demand
    customer: Deploy malicious code protection at appropriate locations —
      enable GuardDuty with malware protection in all FCI-scope regions; deploy
      endpoint protection on EC2 instances running FCI workloads; configure
      SES receipt rules with malware filtering for email; ensure container
      images are scanned for malware before deployment
  monitoring:
  - id: config-guardduty-enabled
    resource_type: AWS::GuardDuty::Detector
    check: GuardDuty detector enabled in all FCI-scope regions; findings
      delivered to centralized Security Hub
  - id: config-guardduty-malware-protection
    resource_type: AWS::GuardDuty::Detector
    check: GuardDuty malware protection enabled for on-demand EC2 EBS volume
      scanning and S3 object scanning
  - id: config-ses-malware-filter
    resource_type: AWS::SES::ReceiptRuleSet
    check: SES receipt rule sets include malware filtering actions for all
      organizational email-receiving identities
  assessment:
    objectives:
    - id: SI.1.211[a]
      description: Malicious code protection mechanisms are employed at
        appropriate locations (endpoint, network, email, storage)
      auto_assessable: true
      evidence_source: config
    - id: SI.1.211[b]
      description: Malicious code is detected and blocked at entry and exit
        points
      auto_assessable: true
      evidence_source: config

- id: SI.1.212
  family: System and Information Integrity
  title: Update malicious code protection mechanisms when new releases are
    available
  description: |
    FAR 52.204-21 b.6.iii. Maps to NIST SP 800-171 Rev 2 control 3.14.2 (partial).
    Ensures malware signatures, threat intelligence feeds, and detection engine
    versions are kept current on all FCI systems.
  responsibility:
    aws: GuardDuty threat intelligence is updated continuously by AWS using
      internal threat intel feeds, partner feeds, and AWS threat research;
      customers do not manage GuardDuty signature updates — this is fully
      AWS-managed
    customer: Update endpoint protection software (antivirus/EDR) on EC2
      instances and developer workstations; update container base images with
      patched security software; verify that GuardDuty is configured to use
      the latest threat intelligence (enabled by default); document the update
      cadence for any non-AWS-managed malware protection tools in use
  assessment:
    objectives:
    - id: SI.1.212[a]
      description: Malicious code protection mechanisms are updated automatically
        where supported
      auto_assessable: true
      evidence_source: config
    - id: SI.1.212[b]
      description: Update status of non-automated malware protection tools is
        verified and documented
      auto_assessable: false
      evidence_source: manual

- id: SI.1.213
  family: System and Information Integrity
  title: Perform periodic scans of the information system and real-time scans
    of files from external sources as files are downloaded, opened, or executed
  description: |
    FAR 52.204-21 b.6.iv. Maps to NIST SP 800-171 Rev 2 control 3.14.2 (partial).
    Requires both scheduled full-system malware scans and real-time scanning
    of files ingested from external sources to catch threats before they
    can execute.
  responsibility:
    aws: GuardDuty Malware Protection provides on-demand and event-triggered
      scanning of EC2 EBS volumes; Amazon Inspector continuously scans EC2
      instances, container images, and Lambda functions for vulnerabilities;
      ECR scans container images on push and continuously for new CVEs
    customer: Schedule periodic malware scans of EC2 instances using SSM Run
      Command or native endpoint protection software; enable real-time file
      scanning at S3 ingestion points (e.g., using GuardDuty S3 malware
      protection); scan downloaded files and email attachments before opening
      or execution; configure Inspector for continuous scanning; review scan
      results and remediate findings within defined SLAs
  monitoring:
  - id: config-inspector-continuous-scanning
    resource_type: AWS::Inspector2::CoverageResource
    check: Amazon Inspector v2 enabled and continuously scanning all EC2
      instances, ECR repositories, and Lambda functions in FCI-scope accounts
  - id: config-guardduty-s3-malware
    resource_type: AWS::GuardDuty::Detector
    check: GuardDuty S3 Malware Protection enabled; newly uploaded objects
      in FCI-scope buckets are scanned on ingest
  - id: config-ecr-image-scanning
    resource_type: AWS::ECR::Repository
    check: ECR scan-on-push enabled for all repositories used in FCI-scope
      workloads; no images with critical CVEs deployed to production
  assessment:
    objectives:
    - id: SI.1.213[a]
      description: Periodic scans of FCI systems are performed on a defined
        schedule
      auto_assessable: true
      evidence_source: config
    - id: SI.1.213[b]
      description: Real-time scans of files from external sources are performed
        as files are downloaded, opened, or executed
      auto_assessable: true
      evidence_source: config
    - id: SI.1.213[c]
      description: Scan results are reviewed and findings remediated within
        defined timeframes
      auto_assessable: false
      evidence_source: manual
