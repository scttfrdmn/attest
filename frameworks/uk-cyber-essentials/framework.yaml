id: uk-cyber-essentials
name: UK Cyber Essentials
version: '2023'
source: https://www.ncsc.gov.uk/cyberessentials/overview
artifact_reports:
- series: ISO 27001
  category: ISO

# UK Cyber Essentials is the UK government's baseline cybersecurity scheme,
# mandatory for suppliers handling government contracts. Five technical themes,
# ~20 AWS-relevant controls. Designed for cloud-hosted research services
# collaborating with UK institutions (UKRI, MRC, EPSRC-funded labs).
#
# SCP overlap: ~90% of conditions already covered by NIST 800-171 R2 or
# ISO 27001:2022. Adding UK CE to an org with NIST+HIPAA costs ~0 SCP chars.

controls:

# --- Theme 1: Firewalls (FW) ---

- id: FW-1
  family: Firewalls
  title: Boundary firewalls and internet gateways configured to protect all systems
  responsibility:
    aws: VPC Security Groups and NACLs provide stateful and stateless firewalling
    customer: Restrict inbound rules; deny 0.0.0.0/0 on all ports except specific services
  structural:
  - id: scp-deny-unapproved-regions
    description: Restrict operations to approved regions, enforcing network boundary
    actions: ['*']
    conditions:
    - aws:RequestedRegion not in [us-east-1, us-east-2, us-west-1, us-west-2, eu-west-1, eu-west-2]
    effect: Deny
  assessment:
    objectives:
    - id: FW-1.1
      description: Default deny inbound from internet to all servers
      auto_assessable: false
      evidence_source: manual
    - id: FW-1.2
      description: Firewall rules documented and approved
      auto_assessable: false
      evidence_source: manual

- id: FW-2
  family: Firewalls
  title: No unapproved services exposed to internet
  responsibility:
    aws: Security Groups default deny-all; VPC endpoints for private AWS API access
    customer: Use private subnets for all compute; only expose via ALB with WAF
  operational:
  - id: cedar-internet-exposure
    description: Internet-facing services require explicit authorization
    entities: [resource, environment]
    attributes:
      resource: [internet_facing, approved_exposure]
  assessment:
    objectives:
    - id: FW-2.1
      description: No unnecessary services exposed to internet
      auto_assessable: false
      evidence_source: manual

# --- Theme 2: Secure Configuration (SC) ---

- id: SC-1
  family: Secure Configuration
  title: Default configurations changed; unnecessary software removed
  responsibility:
    aws: AMIs can be hardened; SSM State Manager enforces configuration baselines
    customer: Use CIS-hardened AMIs; disable default VPC; remove default security groups
  structural:
  - id: scp-require-kms-encryption
    description: Deny unencrypted storage — part of secure baseline configuration
    actions:
    - s3:PutObject
    - ec2:CreateVolume
    - rds:CreateDBInstance
    conditions:
    - aws:RequestedRegion in [us-east-1, us-east-2, us-west-1, us-west-2, eu-west-1, eu-west-2]
    effect: Deny
  assessment:
    objectives:
    - id: SC-1.1
      description: Default passwords changed on all accounts and services
      auto_assessable: false
      evidence_source: manual
    - id: SC-1.2
      description: Unnecessary user accounts removed
      auto_assessable: false
      evidence_source: manual
    - id: SC-1.3
      description: Auto-run and auto-play for removable media disabled
      auto_assessable: true
      evidence_source: aws_managed

- id: SC-2
  family: Secure Configuration
  title: Admin accounts used only for admin activities
  responsibility:
    aws: IAM admin and user roles separated; privilege boundaries enforced
    customer: Separate admin and standard roles; prohibit root for daily use
  structural:
  - id: scp-deny-root-usage
    description: Deny root account usage (admin credentials used only for admin tasks)
    actions: ['*']
    conditions:
    - aws:PrincipalArn == arn:aws:iam::*:root
    effect: Deny
  assessment:
    objectives:
    - id: SC-2.1
      description: Admin accounts used only for admin activities
      auto_assessable: true
      evidence_source: scp

# --- Theme 3: Access Control (AC) ---

- id: AC-1
  family: Access Control
  title: All users have individual accounts with strong authentication
  responsibility:
    aws: IAM users/roles are individual; STS tokens are time-limited
    customer: No shared credentials; enforce MFA for all human principals
  structural:
  - id: scp-require-mfa
    description: Deny all actions without MFA for human principals
    actions: ['*']
    conditions:
    - aws:MultiFactorAuthPresent != true
    - aws:PrincipalType == IAMUser
    effect: Deny
  assessment:
    objectives:
    - id: AC-1.1
      description: Each user has a unique account
      auto_assessable: false
      evidence_source: manual
    - id: AC-1.2
      description: MFA enabled for all user accounts
      auto_assessable: true
      evidence_source: scp
    - id: AC-1.3
      description: Accounts removed or disabled when no longer required
      auto_assessable: false
      evidence_source: manual

- id: AC-2
  family: Access Control
  title: Accounts have only necessary access (least privilege)
  responsibility:
    aws: IAM permission boundaries enforce least privilege; SCPs provide guardrails
    customer: Review and restrict IAM policies; use permission boundaries
  structural:
  - id: scp-deny-admin-star
    description: Deny wildcard IAM actions to non-admin principals
    actions:
    - iam:CreateUser
    - iam:DeleteUser
    - iam:AttachUserPolicy
    conditions:
    - aws:PrincipalOrgPaths != /*/admin/*
    effect: Deny
  assessment:
    objectives:
    - id: AC-2.1
      description: Users have access only to what they need
      auto_assessable: true
      evidence_source: scp

- id: AC-3
  family: Access Control
  title: Service accounts are protected
  responsibility:
    aws: IAM roles used instead of long-lived access keys; STS tokens time-limited
    customer: Use IAM roles for EC2/Lambda; rotate access keys within 90 days
  assessment:
    objectives:
    - id: AC-3.1
      description: Service accounts have unique, complex credentials
      auto_assessable: false
      evidence_source: manual
    - id: AC-3.2
      description: Service account access restricted to necessary APIs
      auto_assessable: false
      evidence_source: manual

# --- Theme 4: Malware Protection (MP) ---

- id: MP-1
  family: Malware Protection
  title: Malware protection installed on devices
  responsibility:
    aws: Amazon Inspector scans EC2 instances and container images for vulnerabilities
    customer: Enable Inspector; use GuardDuty for threat detection
  monitoring:
  - id: config-inspector-enabled
    resource_type: AWS::Inspector2::*
    check: Inspector enabled for EC2, ECR, and Lambda
  assessment:
    objectives:
    - id: MP-1.1
      description: Malware protection active on all devices
      auto_assessable: false
      evidence_source: manual
    - id: MP-1.2
      description: Malware signatures updated
      auto_assessable: true
      evidence_source: aws_managed

- id: MP-2
  family: Malware Protection
  title: Malware protection configured to scan and prevent malicious code
  responsibility:
    aws: GuardDuty detects malicious activity; Security Hub aggregates findings
    customer: Configure GuardDuty with custom threat intelligence; review findings weekly
  monitoring:
  - id: config-guardduty-enabled
    resource_type: AWS::GuardDuty::Detector
    check: GuardDuty active and findings monitored
  assessment:
    objectives:
    - id: MP-2.1
      description: Malware protection configured to scan in real-time
      auto_assessable: false
      evidence_source: manual

# --- Theme 5: Patch Management (PM) ---

- id: PM-1
  family: Patch Management
  title: Software patched within 14 days of release
  responsibility:
    aws: AWS manages patching for managed services; SSM Patch Manager for EC2
    customer: Define and enforce patch baselines; achieve compliance within 14 days
  monitoring:
  - id: config-ssm-patch-compliance
    resource_type: AWS::SSM::PatchCompliance
    check: All EC2 instances compliant with patch baseline (14-day window)
  assessment:
    objectives:
    - id: PM-1.1
      description: High-risk patches applied within 14 days
      auto_assessable: false
      evidence_source: manual
    - id: PM-1.2
      description: Unsupported software removed or isolated
      auto_assessable: false
      evidence_source: manual

- id: PM-2
  family: Patch Management
  title: Licensed and supported software only
  responsibility:
    aws: AWS Marketplace provides licensed software; License Manager tracks entitlements
    customer: Audit software inventory; remove or replace unsupported software
  assessment:
    objectives:
    - id: PM-2.1
      description: Only licensed and supported software in use
      auto_assessable: false
      evidence_source: manual
