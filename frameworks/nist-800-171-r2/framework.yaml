# NIST SP 800-171 Rev 2 — Protecting Controlled Unclassified Information
# in Nonfederal Systems and Organizations
#
# This framework definition maps to CMMC 2.0 Level 2.
# Community-maintained. AWS shared responsibility data enriched at runtime
# from Artifact reports.
#
# Source: https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final
# Assessment: NIST SP 800-171A
#
# 110 controls across 14 families.
# Controls marked [detailed] have full structural/operational/monitoring specs.
# All others are skeleton — community contributions welcome (see frameworks/CONTRIBUTING.md).

id: nist-800-171-r2
name: "NIST SP 800-171 Rev 2"
version: "2.0"
source: "https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final"

artifact_reports:
  - series: "SOC 2 Type II"
    category: "SOC"
  - series: "ISO 27001"
    category: "ISO"

controls:

  # ── 3.1 Access Control (22 controls) ────────────────────────────────

  - id: "3.1.1"  # [detailed]
    family: "Access Control"
    title: "Limit system access to authorized users, processes acting on behalf of authorized users, and devices"
    responsibility:
      aws: "IAM service, API authentication, network infrastructure access controls"
      customer: "IAM policies, user provisioning/deprovisioning, MFA enforcement, device trust"
    structural:
      - id: "scp-require-mfa"
        description: "Deny all actions without MFA for human principals"
        actions:
          - "*"
        conditions:
          - "aws:MultiFactorAuthPresent != true"
          - "aws:PrincipalType == IAMUser"
        effect: "Deny"
    operational:
      - id: "cedar-authorized-principals"
        description: "Only principals with active authorization records can access SRE environments"
        entities: ["principal", "environment"]
        attributes:
          principal: ["authorization_current", "mfa_enabled", "training_complete"]
          environment: ["data_classification", "access_tier"]
    monitoring:
      - id: "config-iam-mfa"
        resource_type: "AWS::IAM::User"
        check: "MFA device attached and active"
        remediation: "Enable MFA via IAM console or CLI"
    assessment:
      objectives:
        - id: "3.1.1[a]"
          description: "Authorized users are identified"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.1[b]"
          description: "Processes acting on behalf of authorized users are identified"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.1[c]"
          description: "Devices authorized to connect are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.1[d]"
          description: "System access is limited to authorized users"
          auto_assessable: true
          evidence_source: "scp"
        - id: "3.1.1[e]"
          description: "System access is limited to authorized processes"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.1[f]"
          description: "System access is limited to authorized devices"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.2"  # [detailed]
    family: "Access Control"
    title: "Limit system access to the types of transactions and functions that authorized users are permitted to execute"
    responsibility:
      aws: "IAM policy evaluation engine, resource-level permissions"
      customer: "Least-privilege IAM policies, role definitions, permission boundaries"
    structural:
      - id: "scp-deny-admin-star"
        description: "Deny iam:*, organizations:*, account:* outside designated admin roles"
        actions:
          - "iam:*"
          - "organizations:*"
          - "account:*"
        conditions:
          - "aws:PrincipalARN != arn:aws:iam::*:role/SREAdmin"
        effect: "Deny"
    operational:
      - id: "cedar-least-privilege"
        description: "Principal actions are limited to their authorized function scope"
        entities: ["principal", "action", "resource"]
        attributes:
          principal: ["role", "function_scope", "lab_membership"]
          resource: ["classification", "owner_lab"]
    monitoring:
      - id: "config-iam-policy-scope"
        resource_type: "AWS::IAM::Policy"
        check: "No IAM policies with Action:* and Resource:*"
    assessment:
      objectives:
        - id: "3.1.2[a]"
          description: "The types of transactions and functions that authorized users are permitted to execute are defined"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.2[b]"
          description: "System access is limited to the defined types of transactions and functions"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.1.3"  # [detailed]
    family: "Access Control"
    title: "Control the flow of CUI in accordance with approved authorizations"
    responsibility:
      aws: "VPC flow control, S3 bucket policies, KMS encryption, network ACLs"
      customer: "Data flow policies, tagging, cross-account controls, encryption key management"
    structural:
      - id: "scp-cui-region-restrict"
        description: "Deny all actions in non-approved regions for CUI workloads"
        actions:
          - "*"
        conditions:
          - "aws:RequestedRegion not in [us-east-1, us-west-2, us-gov-west-1]"
        effect: "Deny"
      - id: "scp-cui-s3-encryption"
        description: "Deny S3 PutObject without server-side encryption using KMS"
        actions:
          - "s3:PutObject"
        conditions:
          - "s3:x-amz-server-side-encryption != aws:kms"
        effect: "Deny"
    operational:
      - id: "cedar-cui-data-movement"
        description: >
          CUI-tagged objects can only move to CUI-authorized destinations.
          Evaluates data classification, destination encryption state,
          destination enclave membership, and principal CUI handling certification.
        entities: ["data_object", "destination_bucket", "principal"]
        attributes:
          data_object: ["classification", "source_account", "source_region"]
          destination_bucket: ["encryption_type", "enclave_membership", "kms_key_arn"]
          principal: ["cui_training_current", "role_membership", "lab_authorization"]
        cedar_policy: |
          // CUI data movement — NIST 800-171 3.1.3
          forbid (
            principal,
            action == Action::"S3:PutObject",
            resource
          )
          unless {
            resource.enclave_membership == true &&
            resource.encryption_type == "aws:kms" &&
            principal.cui_training_current == true &&
            principal.lab_authorization == true
          };
        temporal:
          condition_type: "expiry"
          description: "CUI handling authorization expires with training certification (annual renewal)"
    monitoring:
      - id: "config-s3-encryption-at-rest"
        resource_type: "AWS::S3::Bucket"
        check: "Default encryption enabled with KMS key from enclave key set"
      - id: "config-vpc-flow-logs"
        resource_type: "AWS::EC2::VPC"
        check: "Flow logs enabled and delivered to audit account"
    assessment:
      objectives:
        - id: "3.1.3[a]"
          description: "Information flow control policies are defined"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.3[b]"
          description: "Methods and enforcement mechanisms for controlling the flow of CUI are defined"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.3[c]"
          description: "Approved authorizations for controlling the flow of CUI are defined"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.3[d]"
          description: "The flow of CUI is controlled in accordance with approved authorizations"
          auto_assessable: true
          evidence_source: "cedar"

  - id: "3.1.4"
    family: "Access Control"
    title: "Separate the duties of individuals to reduce the risk of malevolent activity without collusion"
    responsibility:
      aws: "IAM separation of roles; no native duty-separation enforcement"
      customer: "Role design, separation of production/development/admin accounts, approval workflows"
    structural:
      - id: "scp-separate-duties"
        description: "Deny assuming both developer and admin roles from the same session"
        actions:
          - "sts:AssumeRole"
        conditions:
          - "aws:PrincipalARN contains /developer/ and aws:RequestedRegion == us-east-1"
        effect: "Deny"
    assessment:
      objectives:
        - id: "3.1.4[a]"
          description: "The duties of individuals requiring separation are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.4[b]"
          description: "The duties of individuals requiring separation are separated"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.5"  # [detailed]
    family: "Access Control"
    title: "Employ the principle of least privilege, including for specific security functions and privileged accounts"
    responsibility:
      aws: "Root account controls, service-linked roles, AWS managed policies"
      customer: "Custom IAM policies, role design, permission boundaries, privilege escalation prevention"
    structural:
      - id: "scp-deny-root-usage"
        description: "Deny all actions by root user except emergency break-glass"
        actions:
          - "*"
        conditions:
          - "aws:PrincipalARN == arn:aws:iam::*:root"
        effect: "Deny"
      - id: "scp-deny-permission-escalation"
        description: "Deny iam:CreatePolicy, iam:AttachRolePolicy outside admin OU"
        actions:
          - "iam:CreatePolicy"
          - "iam:AttachRolePolicy"
          - "iam:PutRolePolicy"
          - "iam:CreateRole"
        conditions:
          - "aws:PrincipalOrgPaths does not contain /admin/"
        effect: "Deny"
    operational:
      - id: "cedar-privilege-scope"
        description: "Principal permissions are bounded to their lab and function"
        entities: ["principal", "action", "resource"]
        attributes:
          principal: ["role", "lab_id", "admin_level"]
          resource: ["owner_lab", "sensitivity"]
    monitoring:
      - id: "config-no-wildcard-policies"
        resource_type: "AWS::IAM::Policy"
        check: "No policies with Effect:Allow, Action:*, Resource:*"
    assessment:
      objectives:
        - id: "3.1.5[a]"
          description: "Privileged accounts are identified"
          auto_assessable: true
          evidence_source: "cedar"
        - id: "3.1.5[b]"
          description: "Access to privileged accounts is authorized in accordance with the principle of least privilege"
          auto_assessable: true
          evidence_source: "scp"
        - id: "3.1.5[c]"
          description: "Security functions are identified"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.6"
    family: "Access Control"
    title: "Use non-privileged accounts or roles when accessing non-security functions"
    responsibility:
      aws: "IAM role switching; no enforcement of account selection"
      customer: "Role design, user education, tooling that enforces non-privileged default sessions"
    assessment:
      objectives:
        - id: "3.1.6[a]"
          description: "Non-privileged accounts or roles are defined for non-security functions"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.6[b]"
          description: "Non-privileged accounts or roles are used when accessing non-security functions"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.7"
    family: "Access Control"
    title: "Prevent non-privileged users from executing privileged functions and capture the execution of such functions in audit logs"
    responsibility:
      aws: "IAM policy evaluation prevents unauthorized privilege use"
      customer: "IAM permission boundaries, SCPs, CloudTrail audit of privileged API calls"
    structural:
      - id: "scp-prevent-privilege-exec"
        description: "Deny organizations: and cloudtrail: management actions for non-admin principals"
        actions:
          - "organizations:DeleteOrganization"
          - "organizations:RemoveAccountFromOrganization"
          - "cloudtrail:DeleteTrail"
          - "cloudtrail:StopLogging"
        conditions:
          - "aws:PrincipalOrgPaths does not contain /admin/"
        effect: "Deny"
    monitoring:
      - id: "config-cloudtrail-enabled"
        resource_type: "AWS::CloudTrail::Trail"
        check: "CloudTrail multi-region trail enabled and logging"
        remediation: "Enable CloudTrail with multi-region and log file validation"
    assessment:
      objectives:
        - id: "3.1.7[a]"
          description: "Privileged functions are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.7[b]"
          description: "Non-privileged users are prevented from executing privileged functions"
          auto_assessable: true
          evidence_source: "scp"
        - id: "3.1.7[c]"
          description: "Execution of privileged functions is captured in audit logs"
          auto_assessable: true
          evidence_source: "config"

  - id: "3.1.8"
    family: "Access Control"
    title: "Limit unsuccessful logon attempts"
    responsibility:
      aws: "AWS Cognito, IAM temporary lockouts after repeated failures"
      customer: "Account lockout policies in identity provider, Cognito configuration"
    monitoring:
      - id: "config-login-attempt-limits"
        resource_type: "AWS::Cognito::UserPool"
        check: "Advanced security mode enabled with account lockout configured"
    assessment:
      objectives:
        - id: "3.1.8[a]"
          description: "The means of limiting unsuccessful logon attempts is defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.8[b]"
          description: "The defined limit of unsuccessful logon attempts is enforced"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.9"
    family: "Access Control"
    title: "Provide privacy and security notices consistent with CUI rules (CUI Notice and Consent Banner)"
    responsibility:
      aws: "No native banner enforcement; customer responsibility"
      customer: "Login banners in identity provider, API Gateway, SSH configurations"
    assessment:
      objectives:
        - id: "3.1.9[a]"
          description: "Privacy and security notices required by CUI rules are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.9[b]"
          description: "Privacy and security notices are displayed"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.10"
    family: "Access Control"
    title: "Use session lock with pattern-hiding displays after a period of inactivity"
    responsibility:
      aws: "AWS Console session timeouts; no enforcement of client-side lock"
      customer: "Session timeout configuration in identity provider and applications"
    assessment:
      objectives:
        - id: "3.1.10[a]"
          description: "The period of inactivity after which a session lock is initiated is defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.10[b]"
          description: "A session lock is initiated after the defined period of inactivity"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.11"
    family: "Access Control"
    title: "Terminate (automatically) a user session after a defined condition"
    responsibility:
      aws: "STS session duration limits (max 12 hours for roles)"
      customer: "STS session duration configuration, application session timeouts"
    assessment:
      objectives:
        - id: "3.1.11[a]"
          description: "Conditions requiring a session to terminate are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.11[b]"
          description: "A user session is automatically terminated after any of the defined conditions"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.12"
    family: "Access Control"
    title: "Monitor and control remote access sessions"
    responsibility:
      aws: "AWS Systems Manager Session Manager, CloudTrail logging of API activity"
      customer: "Remote access policies, SSM Session Manager configuration, session logging"
    structural:
      - id: "scp-require-ssm-sessions"
        description: "Deny direct SSH/RDP; require SSM Session Manager for remote access"
        actions:
          - "ec2:RunInstances"
        conditions:
          - "ec2:MetadataHttpTokens != required"
        effect: "Deny"
    monitoring:
      - id: "config-ssm-session-logging"
        resource_type: "AWS::SSM::Session"
        check: "SSM Session Manager logging to S3 and CloudWatch enabled"
    assessment:
      objectives:
        - id: "3.1.12[a]"
          description: "Remote access is allowed only through managed access control points"
          auto_assessable: true
          evidence_source: "scp"
        - id: "3.1.12[b]"
          description: "Remote access sessions are monitored"
          auto_assessable: true
          evidence_source: "config"
        - id: "3.1.12[c]"
          description: "Remote access sessions are controlled"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.13"
    family: "Access Control"
    title: "Employ cryptographic mechanisms to protect the confidentiality of remote access sessions"
    responsibility:
      aws: "TLS for all AWS API endpoints; FIPS 140-2 validated TLS options"
      customer: "Enforce TLS, disable non-TLS endpoints, SSM Session Manager encryption"
    structural:
      - id: "scp-require-tls-remote"
        description: "Deny API calls over non-TLS channels"
        actions:
          - "*"
        conditions:
          - "aws:SecureTransport == false"
        effect: "Deny"
    assessment:
      objectives:
        - id: "3.1.13[a]"
          description: "Cryptographic mechanisms to protect the confidentiality of remote access sessions are implemented"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.1.14"
    family: "Access Control"
    title: "Route remote access via managed access control points"
    responsibility:
      aws: "VPC endpoints, PrivateLink, Direct Connect, Transit Gateway"
      customer: "VPC design, route tables, security groups restricting direct internet access"
    assessment:
      objectives:
        - id: "3.1.14[a]"
          description: "Remote access is routed through managed access control points"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.15"
    family: "Access Control"
    title: "Authorize remote execution of privileged commands and access to security-relevant information via remote access only for operational needs"
    responsibility:
      aws: "IAM, STS role assumption controls"
      customer: "Policy controls limiting when privileged commands are allowed via remote sessions"
    assessment:
      objectives:
        - id: "3.1.15[a]"
          description: "Privileged commands authorized for remote execution are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.15[b]"
          description: "Operational needs for remote execution of privileged commands are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.15[c]"
          description: "Remote execution of privileged commands is authorized only for defined operational needs"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.16"
    family: "Access Control"
    title: "Authorize wireless access prior to allowing such connections"
    responsibility:
      aws: "Not applicable to AWS infrastructure; relevant for on-premises endpoints connecting to AWS"
      customer: "Wireless access controls for on-premises infrastructure, VPN gateway configuration"
    assessment:
      objectives:
        - id: "3.1.16[a]"
          description: "Wireless access points are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.16[b]"
          description: "Wireless access is authorized prior to allowing connections"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.17"
    family: "Access Control"
    title: "Protect wireless access using authentication and encryption"
    responsibility:
      aws: "Not applicable to AWS infrastructure"
      customer: "WPA3 or equivalent wireless security, certificate-based authentication"
    assessment:
      objectives:
        - id: "3.1.17[a]"
          description: "Wireless access is protected using authentication"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.17[b]"
          description: "Wireless access is protected using encryption"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.18"
    family: "Access Control"
    title: "Control connection of mobile devices"
    responsibility:
      aws: "IAM device trust, certificate-based device authentication"
      customer: "MDM policies, device compliance checks, conditional access"
    assessment:
      objectives:
        - id: "3.1.18[a]"
          description: "Mobile devices that process, store, or transmit CUI are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.18[b]"
          description: "Mobile device connections are authorized and controlled"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.19"
    family: "Access Control"
    title: "Encrypt CUI on mobile devices and mobile computing platforms"
    responsibility:
      aws: "S3 and other storage encryption for data at rest"
      customer: "Device encryption enforcement via MDM, encryption of CUI on endpoints"
    assessment:
      objectives:
        - id: "3.1.19[a]"
          description: "CUI on mobile devices is encrypted"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.20"
    family: "Access Control"
    title: "Verify and control/limit connections to external systems"
    responsibility:
      aws: "VPC peering controls, Transit Gateway, Network Firewall, Firewall Manager"
      customer: "External system connection policies, VPC design, egress controls"
    structural:
      - id: "scp-control-external-connections"
        description: "Deny VPC peering to non-approved external accounts"
        actions:
          - "ec2:AcceptVpcPeeringConnection"
          - "ec2:CreateVpcPeeringConnection"
        conditions:
          - "aws:PrincipalOrgPaths does not contain /admin/"
        effect: "Deny"
    assessment:
      objectives:
        - id: "3.1.20[a]"
          description: "Connections to external systems are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.20[b]"
          description: "The use of external systems is verified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.20[c]"
          description: "Connections to external systems are controlled"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.1.21"
    family: "Access Control"
    title: "Limit use of portable storage devices on external systems"
    responsibility:
      aws: "Not directly applicable to AWS cloud; relevant for endpoints connecting to AWS"
      customer: "Endpoint DLP controls, SSM policy to deny USB storage on managed instances"
    assessment:
      objectives:
        - id: "3.1.21[a]"
          description: "The use of portable storage devices is restricted on external systems"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.1.22"
    family: "Access Control"
    title: "Control CUI posted or processed on publicly accessible systems"
    responsibility:
      aws: "S3 Block Public Access, CloudFront signed URLs"
      customer: "S3 public access settings, bucket policies, DLP controls"
    structural:
      - id: "scp-block-s3-public-access"
        description: "Deny disabling S3 Block Public Access at account level"
        actions:
          - "s3:PutAccountPublicAccessBlock"
          - "s3:PutBucketPublicAccessBlock"
        conditions:
          - "aws:PrincipalOrgPaths does not contain /admin/"
        effect: "Deny"
    monitoring:
      - id: "config-s3-block-public-access"
        resource_type: "AWS::S3::Bucket"
        check: "S3 Block Public Access enabled on all buckets and account"
        remediation: "Enable S3 Block Public Access settings"
    assessment:
      objectives:
        - id: "3.1.22[a]"
          description: "Individuals authorized to post CUI on publicly accessible systems are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.1.22[b]"
          description: "CUI is not posted on publicly accessible systems without authorization"
          auto_assessable: true
          evidence_source: "config"

  # ── 3.2 Awareness and Training (3 controls) ──────────────────────────

  - id: "3.2.1"
    family: "Awareness and Training"
    title: "Ensure that managers, systems administrators, and users of organizational systems are made aware of the security risks associated with their activities"
    responsibility:
      aws: "AWS Security Hub documentation, Artifact compliance reports"
      customer: "Security awareness program, training records, LMS administration"
    assessment:
      objectives:
        - id: "3.2.1[a]"
          description: "Security risks associated with activities are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.2.1[b]"
          description: "Managers are made aware of security risks"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.2.1[c]"
          description: "Systems administrators are made aware of security risks"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.2.1[d]"
          description: "Users are made aware of security risks"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.2.2"
    family: "Awareness and Training"
    title: "Ensure that personnel are trained to carry out their assigned information security responsibilities"
    responsibility:
      aws: "AWS training and certification materials"
      customer: "Role-based security training program, training completion tracking"
    assessment:
      objectives:
        - id: "3.2.2[a]"
          description: "Information security responsibilities are identified for all personnel"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.2.2[b]"
          description: "Personnel are trained to carry out their assigned information security responsibilities"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.2.3"
    family: "Awareness and Training"
    title: "Provide security awareness training on recognizing and reporting potential indicators of insider threat"
    responsibility:
      aws: "Amazon GuardDuty insider threat detection capabilities"
      customer: "Insider threat awareness program, reporting mechanisms, GuardDuty configuration"
    monitoring:
      - id: "config-guardduty-enabled"
        resource_type: "AWS::GuardDuty::Detector"
