        - id: "3.14.2[a]"
          description: "Malicious code protection mechanisms are implemented"
          auto_assessable: true
          evidence_source: "config"
        - id: "3.14.2[b]"
          description: "Malicious code protection is updated when new releases are available"
          auto_assessable: true
          evidence_source: "config"

  - id: "3.14.3"
    family: "System and Information Integrity"
    title: "Monitor system security alerts and advisories and take action in response"
    responsibility:
      aws: "AWS Health Dashboard, Security Bulletins, Security Hub findings"
      customer: "AWS Health event subscriptions, Security Hub notification rules, response procedures"
    monitoring:
