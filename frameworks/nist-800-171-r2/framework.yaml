    structural:
      - id: "scp-require-tls-transit"
        description: "Deny all API calls not using TLS (SecureTransport)"
        actions:
          - "*"
        conditions:
          - "aws:SecureTransport == false"
        effect: "Deny"
    assessment:
      objectives:
        - id: "3.13.8[a]"
          description: "Cryptographic mechanisms are implemented to prevent unauthorized disclosure of CUI during transmission"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.13.9"
    family: "System and Communications Protection"
    title: "Terminate network connections associated with communications sessions after a defined period of inactivity"
    responsibility:
      aws: "ELB idle timeout, RDS connection timeout, STS session duration"
      customer: "ALB idle timeout configuration, API Gateway timeout, session management"
    assessment:
      objectives:
        - id: "3.13.9[a]"
          description: "The period of inactivity for network connection termination is defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.13.9[b]"
          description: "Network connections are terminated after the defined period of inactivity"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.13.10"
    family: "System and Communications Protection"
    title: "Establish and manage cryptographic keys for cryptography employed in organizational systems"
    responsibility:
      aws: "AWS KMS manages key storage, rotation, and access control"
      customer: "KMS CMK creation, key policies, annual key rotation enablement"
    monitoring:
      - id: "config-kms-key-rotation"
        resource_type: "AWS::KMS::Key"
        check: "KMS CMK annual rotation enabled"
        remediation: "Enable automatic key rotation for KMS CMKs"
    assessment:
      objectives:
        - id: "3.13.10[a]"
          description: "Cryptographic keys are generated and distributed"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.13.10[b]"
          description: "Cryptographic keys are stored and destroyed appropriately"
          auto_assessable: true
          evidence_source: "config"

  - id: "3.13.11"  # [detailed]
    family: "System and Communications Protection"
    title: "Employ FIPS-validated cryptography when used to protect the confidentiality of CUI"
    responsibility:
      aws: "FIPS 140-2 validated endpoints, KMS HSMs, S3 SSE"
      customer: "Use of FIPS endpoints, KMS key policies, TLS configuration"
    structural:
      - id: "scp-require-fips-endpoints"
        description: "Deny API calls not using FIPS endpoints where available"
        actions:
          - "*"
        conditions:
          - "aws:SecureTransport == false"
        effect: "Deny"
      - id: "scp-require-kms-encryption"
        description: "Deny storage operations without KMS encryption"
        actions:
          - "s3:PutObject"
          - "rds:CreateDBInstance"
          - "ebs:CreateVolume"
        conditions:
          - "encryption != aws:kms"
        effect: "Deny"
    operational:
      - id: "cedar-fips-crypto"
        description: "CUI operations must use FIPS-validated cryptographic modules"
        entities: ["operation", "crypto_context"]
        attributes:
          operation: ["data_classification", "api_endpoint"]
          crypto_context: ["fips_validated", "key_algorithm", "key_length"]
    monitoring:
      - id: "config-s3-default-encryption"
        resource_type: "AWS::S3::Bucket"
        check: "Default encryption with KMS (not SSE-S3)"
      - id: "config-ebs-encryption"
        resource_type: "AWS::EC2::Volume"
        check: "EBS volumes encrypted with KMS"
    assessment:
      objectives:
        - id: "3.13.11[a]"
          description: "FIPS-validated cryptography is employed to protect CUI confidentiality"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.13.12"
    family: "System and Communications Protection"
    title: "Prohibit remote activation of collaborative computing devices and provide indication of use to present users"
    responsibility:
      aws: "EC2 instance console access controls; Chime, Workspaces controls"
      customer: "Policy controls for video/audio collaboration tools in SRE environments"
    assessment:
      objectives:
        - id: "3.13.12[a]"
          description: "Collaborative computing devices that can be remotely activated are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.13.12[b]"
          description: "Remote activation of collaborative computing devices is prohibited"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.13.13"
    family: "System and Communications Protection"
    title: "Control and monitor the use of mobile code"
    responsibility:
      aws: "Lambda execution controls; no native mobile code monitoring"
      customer: "Lambda function policies, code signing, approved runtime versions"
    structural:
      - id: "scp-lambda-code-signing"
        description: "Deny Lambda function creation without code signing configuration"
        actions:
          - "lambda:CreateFunction"
          - "lambda:UpdateFunctionCode"
        conditions:
          - "lambda:CodeSigningConfigArn == \"\""
        effect: "Deny"
    assessment:
      objectives:
        - id: "3.13.13[a]"
          description: "Acceptable mobile code and mobile code technologies are defined"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.13.13[b]"
          description: "The use of mobile code is controlled and monitored"
          auto_assessable: true
          evidence_source: "scp"

  - id: "3.13.14"
    family: "System and Communications Protection"
    title: "Control and monitor the use of Voice over Internet Protocol (VoIP) technologies"
    responsibility:
      aws: "Amazon Chime, Connect controls"
      customer: "SCP to restrict VoIP service usage in SRE environments if not approved"
    assessment:
      objectives:
        - id: "3.13.14[a]"
          description: "VoIP technologies in use are identified"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.13.14[b]"
          description: "VoIP technologies are controlled and monitored"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.13.15"
    family: "System and Communications Protection"
    title: "Protect the authenticity of communications sessions"
    responsibility:
      aws: "AWS SigV4 request signing, TLS session authentication"
      customer: "TLS certificate management, certificate pinning for critical services"
    assessment:
      objectives:
        - id: "3.13.15[a]"
          description: "The authenticity of communications sessions is protected"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.13.16"
    family: "System and Communications Protection"
    title: "Protect the confidentiality of CUI at rest"
    responsibility:
      aws: "S3 SSE, EBS encryption, RDS encryption at rest"
      customer: "Enable encryption at rest for all CUI storage; KMS CMK management"
    structural:
      - id: "scp-encrypt-at-rest"
        description: "Deny creation of unencrypted storage resources"
        actions:
          - "s3:CreateBucket"
          - "rds:CreateDBInstance"
          - "dynamodb:CreateTable"
        conditions:
          - "aws:RequestTag/attest:data-class contains CUI"
        effect: "Deny"
    monitoring:
      - id: "config-rds-encrypted"
        resource_type: "AWS::RDS::DBInstance"
        check: "RDS instances encrypted at rest with KMS"
        remediation: "Create encrypted RDS snapshot and restore"
      - id: "config-dynamodb-encrypted"
        resource_type: "AWS::DynamoDB::Table"
        check: "DynamoDB tables encrypted with customer-managed KMS key"
    assessment:
      objectives:
        - id: "3.13.16[a]"
          description: "CUI at rest is encrypted"
          auto_assessable: true
          evidence_source: "config"

  # ── 3.14 System and Information Integrity (7 controls) ───────────────

  - id: "3.14.1"
    family: "System and Information Integrity"
    title: "Identify, report, and correct system flaws in a timely manner"
    responsibility:
      aws: "Amazon Inspector for vulnerability identification; AWS patch advisories"
      customer: "Inspector activation, SSM Patch Manager for patching, remediation SLAs"
    monitoring:
      - id: "config-inspector-v2"
        resource_type: "AWS::Inspector2::Coverage"
        check: "Amazon Inspector v2 enabled org-wide with EC2 and Lambda scanning"
        remediation: "Enable Inspector v2 via Organizations delegated admin account"
      - id: "config-ssm-patch-compliance-v2"
        resource_type: "AWS::SSM::PatchCompliance"
        check: "All managed instances patch-compliant within 30 days of patch release"
    assessment:
      objectives:
        - id: "3.14.1[a]"
          description: "System flaws are identified"
          auto_assessable: true
          evidence_source: "config"
        - id: "3.14.1[b]"
          description: "System flaws are reported"
          auto_assessable: false
          evidence_source: "manual"
        - id: "3.14.1[c]"
          description: "System flaws are corrected in a timely manner"
          auto_assessable: true
          evidence_source: "config"

  - id: "3.14.2"
    family: "System and Information Integrity"
    title: "Provide protection from malicious code at appropriate locations within organizational systems"
    responsibility:
      aws: "Amazon GuardDuty malware protection, Inspector for known CVEs"
      customer: "GuardDuty Malware Protection activation, EC2 endpoint protection agents"
    monitoring:
      - id: "config-guardduty-malware"
        resource_type: "AWS::GuardDuty::Detector"
        check: "GuardDuty Malware Protection enabled"
        remediation: "Enable GuardDuty Malware Protection in GuardDuty settings"
    assessment:
