  - id: "3.13.6"
    family: "System and Communications Protection"
    title: "Deny network communications traffic by default and allow network communications traffic by exception (i.e., deny all, permit by exception)"
    responsibility:
      aws: "Security group default deny inbound; NACL default deny"
      customer: "Explicitly allow required traffic in security groups; default deny all"
