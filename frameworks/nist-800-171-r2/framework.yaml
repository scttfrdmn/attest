        - id: "3.14.3[b]"
          description: "Actions are taken in response to alerts and advisories"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.14.4"
    family: "System and Information Integrity"
    title: "Update malicious code protection mechanisms when new releases are available"
    responsibility:
      aws: "GuardDuty threat intelligence automatically updated by AWS"
      customer: "GuardDuty enabled; endpoint AV tools updated via SSM or AMI pipeline"
    assessment:
      objectives:
        - id: "3.14.4[a]"
          description: "Malicious code protection mechanisms are updated when new releases are available"
          auto_assessable: false
          evidence_source: "manual"

  - id: "3.14.5"
    family: "System and Information Integrity"
    title: "Perform periodic scans of organizational systems and real-time scans of files from external sources as files are downloaded, opened, or executed"
    responsibility:
      aws: "Inspector continuous scanning, GuardDuty real-time event analysis"
      customer: "Inspector scheduled scans, GuardDuty S3 malware protection for upload scanning"
    monitoring:
      - id: "config-inspector-continuous-scan"
        resource_type: "AWS::Inspector2::Coverage"
        check: "Inspector continuous scanning enabled (not just on-demand)"
    assessment:
      objectives:
        - id: "3.14.5[a]"
